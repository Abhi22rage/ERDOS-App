name: phe_app
description: PHE Emergency Repair Management App - Flutter Edition
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase backend
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Local Storage
  shared_preferences: ^2.3.5

  # Image Picker & Display
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  timeago: ^3.7.0

  # Charts
  fl_chart: ^1.2.0

  # UI
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.17
  badges: ^3.1.2

  geocoding: ^4.0.0

  # Icons
  lucide_icons: 0.257.0

  # Loading & Animations
  lottie: ^3.3.1

  cupertino_icons: ^1.0.8
  dotted_border: ^3.1.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
